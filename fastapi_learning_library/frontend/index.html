<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Learning Library</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <div>
          <h1>Learning Library</h1>
          <p>Track books, courses, articles, and other study resources.</p>
        </div>
        <button id="logoutButton" type="button">Logout</button>
      </header>

      <section class="panel">
        <h2>Account</h2>
        <p id="currentUser">Not logged in</p>
        <div class="forms-grid">
          <form id="registerForm">
            <h3>Register</h3>
            <label>
              Username
              <input name="username" required minlength="3" />
            </label>
            <label>
              Email
              <input name="email" type="email" required />
            </label>
            <label>
              Password
              <input name="password" type="password" required minlength="8" />
            </label>
            <button type="submit">Register</button>
          </form>

          <form id="loginForm">
            <h3>Login</h3>
            <label>
              Username
              <input name="username" required />
            </label>
            <label>
              Password
              <input name="password" type="password" required />
            </label>
            <button type="submit">Login</button>
          </form>
        </div>
      </section>

      <section class="panel">
        <h2>Add resource</h2>
        <form id="resourceForm" class="resource-form">
          <label>
            Title
            <input name="title" required />
          </label>
          <label>
            Author
            <input name="author" />
          </label>
          <label>
            Category
            <input name="category" />
          </label>
          <label>
            Status
            <select name="status">
              <option value="planned">planned</option>
              <option value="reading">reading</option>
              <option value="finished">finished</option>
              <option value="archived">archived</option>
            </select>
          </label>
          <label>
            Rating
            <input name="rating" type="number" min="1" max="5" />
          </label>
          <label class="full-width">
            Notes
            <textarea name="notes" rows="3"></textarea>
          </label>
          <button type="submit">Create resource</button>
        </form>
      </section>

      <section class="panel">
        <div class="list-header">
          <h2>Resources</h2>
          <form id="filterForm" class="filters">
            <input name="q" placeholder="Search" />
            <select name="status">
              <option value="">All statuses</option>
              <option value="planned">planned</option>
              <option value="reading">reading</option>
              <option value="finished">finished</option>
              <option value="archived">archived</option>
            </select>
            <button type="submit">Apply</button>
          </form>
        </div>
        <p id="message" class="message"></p>
        <ul id="resourceList" class="resource-list"></ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
